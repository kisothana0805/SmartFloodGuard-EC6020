<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline</title>
  <style>
    body { background:#0b1220; color:#e9eefc; font-family: Arial, sans-serif; display:flex; height:100vh; align-items:center; justify-content:center; }
    .box { max-width:420px; text-align:center; padding:24px; border-radius:16px; background:rgba(255,255,255,0.06); }
    .muted { opacity:0.8; }
    a { color:#9ec5ff; text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>You are offline</h2>
    <p class="muted">Dashboard cannot fetch live data right now.</p>
    <p class="muted">Connect to WiFi and reopen the app.</p>
    <p><a href="/flood_monitor/app/">Try again</a></p>
  </div>
</body>
</html>
